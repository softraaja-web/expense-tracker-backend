# render.yaml - Render deployment configuration (Native Python)
services:
  - type: web
    name: gpay-transaction-extractor
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TESSERACT_CMD
        value: /usr/bin/tesseract
      - key: CORS_ORIGINS
        value: "*"
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.6"
    healthCheckPath: /health
    plan: free
