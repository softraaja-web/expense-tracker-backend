# render.yaml - Render deployment configuration
services:
  - type: web
    name: gpay-transaction-extractor
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TESSERACT_CMD
        value: /usr/bin/tesseract
      - key: CORS_ORIGINS
        value: "*"
      - key: DEBUG
        value: "false"
    healthCheckPath: /health
    plan: free
