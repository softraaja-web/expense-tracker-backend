<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="gpay_extractor">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>gpay_extractor</title>
  <link rel="manifest" href="manifest.json">
  <!-- Razorpay SDK for Web -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    function openRazorpay(key, amount, name, description, orderId, email, contact) {
      console.log("Opening Razorpay with Order ID:", orderId);
      var options = {
        "key": key,
        "amount": amount,
        "currency": "INR",
        "name": name,
        "description": description,
        "order_id": orderId,
        "handler": function (response) {
          window.dispatchEvent(new CustomEvent('razorpay_success', {
            detail: {
              payment_id: response.razorpay_payment_id,
              order_id: response.razorpay_order_id,
              signature: response.razorpay_signature
            }
          }));
        },
        "prefill": {
          "email": email,
          "contact": contact
        },
        "config": {
          "display": {
            "blocks": {
              "upi": {
                "name": "UPI / Google Pay / PhonePe",
                "instruments": [
                  {
                    "method": "upi"
                  }
                ]
              }
            },
            "sequence": ["block.upi", "block.other"],
            "preferences": {
              "show_default_blocks": true
            }
          }
        },
        "theme": {
          "color": "#6C63FF"
        }
      };
      var rzp1 = new Razorpay(options);
      rzp1.on('payment.failed', function (response){
        console.error("Payment failed:", response.error);
        window.dispatchEvent(new CustomEvent('razorpay_error', {
          detail: { message: response.error.description }
        }));
      });
      rzp1.open();
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
